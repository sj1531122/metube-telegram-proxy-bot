services:
  app:
    build:
      context: .
    image: metube-direct-local:latest
    container_name: metube-direct-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOWNLOAD_DIR: /downloads
      STATE_DIR: /state
      HTTP_BIND: 0.0.0.0
      HTTP_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - ./data/downloads:/downloads
      - ./data/state:/state
      # Optional: mount a Netscape cookies.txt file and set
      # COOKIES_FILE=/run/secrets/cookies.txt in .env to enable it.
      # - ./secrets/cookies.txt:/run/secrets/cookies.txt:ro
